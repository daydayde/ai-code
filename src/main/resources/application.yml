spring:
  application:
    name: ai-code
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/db04
    username: root
    password: 1234
server:
  port: 8080 # ????
  servlet:
    context-path: /api # ???????????

# springdoc-openai????(knife4j)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.bobby.aicode.controller
knife4j:
  enable: true
  setting:
    language: zh_cn